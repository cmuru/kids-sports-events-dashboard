# Kids Sports Calendar Dashboard — Configuration
# Edit this file and push to update the dashboard.

# Your timezone (IANA format). Remove this line to use the default (UTC on GitHub Actions).
# Examples: America/Toronto, America/New_York, America/Chicago, America/Los_Angeles
timezone: "America/Toronto"

# Single shared webcal feed URL — contains events for all children.
# webcal:// URLs are automatically converted to https://.
webcalUrl: "webcal://calendar.bluesombrero.com/api/v1/Calendar?instancekey=leagues&portalId=11017&id=46964193&key=KJQW4FNC"

kids:
  # coachName: substring matched (case-insensitive) against each event's description
  # to assign it to this child. Omit to receive all events from the shared feed.
  - name: "Emma"
    coachName: "Team Griffith"
    seasonEndDate: "2026-06-30"

  - name: "Oliver"
    coachName: "2BE-Bernie"
    seasonEndDate: "2026-06-30"
